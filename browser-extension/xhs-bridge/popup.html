<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小红书运营台助手</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 14px;
        font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
        background: #f7f9fc;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }
      p {
        margin: 0 0 12px;
        color: #657083;
      }
      button {
        width: 100%;
        border: 1px solid #d8e0ec;
        border-radius: 8px;
        padding: 9px 10px;
        margin-top: 8px;
        background: #fff;
        color: #172033;
        cursor: pointer;
      }
      button.primary {
        border-color: #ff315f;
        background: #ff315f;
        color: white;
      }
      input {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #d8e0ec;
        border-radius: 8px;
        padding: 9px 10px;
        font-size: 18px;
        letter-spacing: 0.2em;
        text-align: center;
      }
      [hidden] { display: none !important; }
      #status {
        min-height: 18px;
        margin-top: 10px;
        word-break: break-word;
        color: #657083;
      }
      #status.ok {
        color: #047857;
      }
      #status.error {
        color: #b42318;
      }
    </style>
  </head>
  <body>
    <h1>小红书运营台助手</h1>
    <p>首次使用请在运营台生成配对码。配对成功后，登录当前浏览器的小红书即可同步登录态。</p>
    <section id="pairing-panel">
      <input id="pairing-code" inputmode="numeric" maxlength="6" autocomplete="one-time-code" placeholder="6 位配对码" />
      <button id="pair" class="primary">连接运营台</button>
    </section>
    <section id="paired-panel" hidden>
      <button id="open-xhs">打开小红书</button>
      <button id="sync" class="primary">同步当前浏览器登录态</button>
      <button id="unpair">解除配对</button>
    </section>
    <div id="status">等待操作</div>
    <script src="popup.js"></script>
  </body>
</html>
